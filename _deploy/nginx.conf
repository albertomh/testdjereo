# testdjereo nginx config

# HTTP:80 = catch-all server block, resulting in a 444 response for unknown domains.
server {
    listen 80 default_server;
    # listen [::]:80 ipv6only=on default_server;
    # server_name "_";
    return 444;
}

# HTTPS:443 = catch-all server block, resulting in reject SSL connection for unknown domains
server {
    listen 443 default_server;
    # listen [::]:443 ipv6only=on default_server;
    # server_name "_";
    ssl_reject_handshake on;
}

server {
    listen       80;
    # in prod switch to eg. `server_name  djereo.com www.djereo.com;`
    server_name  localhost;

    location /static/ {
        alias   /static/;
        expires 30d;
        autoindex off;
    }

    location / {
        proxy_pass       http://testdjereo:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
