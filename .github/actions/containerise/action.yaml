# Re-usable GitHub Action that Dockerises the app and pushes the container
# to a registry. By default this is the GitHub Container Registry.
#
# Usage:
#   ```
#   steps:
#     - run: |
#         echo "REPO_NAME=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV
#     - uses: ./.github/actions/containerise
#         with:
#           git_ref: [ <branch> | <tag> ]
#           username: ${{ github.actor }}
#           password: ${{ github.token }}
#           tags:
#             ghcr.io/${{ env.REPO_NAME }}:${{ github.ref_name }},
#             <registry>/<name>:<some-tag>,
#             ...
#   ```
#
# IMPORTANT!
# > nav <https://github.com/USERNAME?tab=packages>
# > select package
# > rhs sidebar 'Package settings'
# > under 'Manage Actions access'
# > click [Add Repository] btn
# [v. IMPORTANT!] > change the repository's role from 'Read' to 'Write'
#
# ALSO:
# > nav <https://github.com/<USERNAME>/<REPO>/settings/actions>
# > under 'Workflow permissions'
# > select 'Read and write permissions' option
# > Save

name: 'containerise'
description: 'Run all pre-commit hooks against the codebase'

inputs:
  git_ref:
    description: 'Git ref (branch or tag) to check out'
    # TODO: is it truly required? look at use in pr.yaml, which doesn't declare a git_ref
    required: true
  username:
    description: 'Container registry username'
    required: true
  password:
    description: 'Container registry password'
    required: true
  tags:
    description: 'Tags to assign to the image'
    required: true
  dockerfile:
    description: 'Path to Dockerfile'
    required: false
    default: 'Dockerfile'
  registry:
    description: 'Container registry'
    required: false
    default: 'ghcr.io'
  platforms:
    description: 'Comma-separated list of architectures to target'
    required: false
    default: linux/amd64,linux/arm64  # Intel-based VPS, Apple Silicon
  provenance:
    description: 'Whether to generate provenance attestation for the build'
    required: false
    # must be false for multi-arch builds with recent versions of 'build-push-action'
    # see https://github.com/docker/build-push-action/issues/773
    default: 'false'

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.git_ref }}
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
    - uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: true
        provenance: ${{ inputs.provenance }}
        tags: ${{ inputs.tags }}
